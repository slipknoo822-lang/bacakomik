name: Build Bacakomik APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Decode or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore from base64..."
          base64 --decode debug.keystore.base64 > debug.keystore
        elif [ ! -f debug.keystore ]; then
          echo "Generating fallback debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Download clean gradle-wrapper.jar
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Fix line endings for gradlew
      run: sed -i 's/\r$//' gradlew

    - name: Create dummy .env file
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Build Artifact (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Bacakomik-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
